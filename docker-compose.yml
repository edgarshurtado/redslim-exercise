services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: redslim-exercise
      POSTGRES_USER: redslim
      POSTGRES_PASSWORD: redslim
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U redslim -d redslim-exercise"]
      interval: 5s
      timeout: 5s
      retries: 5
